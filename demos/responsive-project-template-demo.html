<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-commerce Upgrade Responsive Demo</title>
    <style>
      :root {
        --bg: #f6f3ee;
        --paper: #fffefa;
        --ink: #171717;
        --muted: rgba(23, 23, 23, 0.58);
        --line: rgba(23, 23, 23, 0.14);
        --accent: #c15045;
        --dark: #191919;
        --radius: 8px;
        --gutter: clamp(16px, 4vw, 60px);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background:
          linear-gradient(90deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px) 0 0 / 72px 72px,
          linear-gradient(0deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px) 0 0 / 72px 72px,
          var(--bg);
        color: var(--ink);
        font-family:
          Urbanist, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(100%, 1720px);
        margin: 0 auto;
      }

      .header {
        min-height: min(780px, 100svh);
        display: grid;
        align-content: end;
        gap: clamp(24px, 4vw, 52px);
        padding: clamp(72px, 10vw, 150px) var(--gutter) clamp(30px, 6vw, 80px);
      }

      .breadcrumb {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .h-title {
        margin: 0;
        max-width: 10ch;
        font-size: clamp(62px, 12vw, 172px);
        font-weight: 300;
        line-height: 0.86;
        letter-spacing: 0;
      }

      .h-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        overflow: hidden;
        width: min(100%, 900px);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--line);
      }

      .h-stat {
        min-width: 0;
        padding: 18px;
        background: rgba(255, 255, 255, 0.68);
      }

      .h-stat .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.35;
      }

      .h-stat .value {
        margin-top: 10px;
        font-size: clamp(28px, 4vw, 52px);
        font-weight: 900;
        line-height: 1;
      }

      .body {
        display: grid;
        grid-template-columns: minmax(220px, 310px) minmax(0, 1fr);
        gap: clamp(20px, 4vw, 56px);
        padding: 0 var(--gutter) clamp(60px, 8vw, 110px);
        align-items: start;
      }

      .rail {
        position: sticky;
        top: 24px;
        display: grid;
        gap: 10px;
      }

      .acc-item {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.62);
        overflow: hidden;
      }

      .acc-trigger {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px;
        color: var(--ink);
        font-size: 15px;
        font-weight: 800;
      }

      .acc-body {
        padding: 0 14px 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }

      .content {
        display: grid;
        gap: clamp(16px, 2.4vw, 28px);
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
      }

      .card-inner {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
        min-height: clamp(440px, 58vw, 720px);
      }

      .card:nth-child(even) .card-inner {
        grid-template-columns: minmax(320px, 0.92fr) minmax(0, 1.08fr);
      }

      .media {
        position: relative;
        min-height: 360px;
        background:
          radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.8), transparent 28%),
          var(--media-bg, #dfe6de);
        overflow: hidden;
      }

      .media::before,
      .media::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        transform: rotate(-12deg);
      }

      .media::before {
        left: 13%;
        top: 30%;
        width: 72%;
        height: 20%;
        background: color-mix(in srgb, var(--ink) 86%, var(--media-bg));
        box-shadow: 0 30px 70px rgba(23, 23, 23, 0.18);
      }

      .media::after {
        right: 14%;
        bottom: 18%;
        width: 44%;
        height: 10%;
        background: rgba(255, 255, 255, 0.78);
      }

      .copy {
        display: grid;
        align-content: end;
        gap: 18px;
        padding: clamp(24px, 4vw, 56px);
      }

      .kicker {
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        max-width: 12ch;
        font-size: clamp(38px, 5.4vw, 84px);
        font-weight: 300;
        line-height: 0.95;
      }

      .text {
        display: grid;
        gap: 10px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.65;
      }

      .text p {
        margin: 0;
      }

      .mini-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .mini {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 14px;
        background: rgba(255, 255, 255, 0.58);
      }

      .mini b {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
      }

      .mini span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .gallery-card .card-inner {
        grid-template-columns: 1fr;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        padding: clamp(18px, 3vw, 42px);
      }

      .shot {
        min-height: clamp(180px, 28vw, 420px);
        border-radius: var(--radius);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 48%),
          var(--media-bg, #dfe6de);
      }

      .outro {
        margin: 0 var(--gutter) var(--gutter);
        border-radius: var(--radius);
        background: var(--dark);
        color: white;
        overflow: hidden;
      }

      .outro-inner {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 420px);
        gap: clamp(24px, 5vw, 80px);
        align-items: end;
        min-height: 520px;
        padding: clamp(28px, 6vw, 76px);
      }

      .next-eyebrow {
        display: block;
        margin-bottom: 16px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .next-title {
        font-size: clamp(50px, 9vw, 130px);
        font-weight: 300;
        line-height: 0.9;
      }

      .next-thumb {
        min-height: 260px;
        border-radius: var(--radius);
        background:
          radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.32), transparent 28%),
          #323232;
      }

      @media (max-width: 1080px) {
        .body {
          grid-template-columns: 1fr;
        }

        .rail {
          position: sticky;
          top: 0;
          z-index: 10;
          display: flex;
          gap: 8px;
          overflow-x: auto;
          margin-inline: calc(var(--gutter) * -1);
          padding: 10px var(--gutter);
          border-block: 1px solid var(--line);
          background: color-mix(in srgb, var(--bg) 92%, white);
          backdrop-filter: blur(18px);
        }

        .acc-item {
          flex: 0 0 min(280px, 76vw);
        }

        .acc-body {
          display: none;
        }
      }

      @media (max-width: 820px) {
        .h-stats {
          grid-template-columns: 1fr;
        }

        .card-inner,
        .card:nth-child(even) .card-inner,
        .outro-inner {
          grid-template-columns: 1fr;
        }

        .copy {
          align-content: start;
        }

        .mini-grid,
        .gallery {
          grid-template-columns: 1fr;
        }

        .title {
          max-width: 13ch;
        }
      }

      @media (max-width: 520px) {
        .header {
          min-height: auto;
          padding-top: 52px;
        }

        .h-title {
          font-size: clamp(48px, 16vw, 74px);
          line-height: 0.95;
        }

        .media {
          min-height: 280px;
        }

        .copy {
          padding: 22px;
        }

        .outro-inner {
          min-height: 420px;
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" id="app"></main>

    <script>
      const project = {
        breadcrumb: "首页 / 全球官网UX与视觉系统重塑，从0到1的全链路建设",
        title: "Shokz\n跨境电商体验升级",
        stats: [
          ["BFCM预估营收增量", "+2.6 m"],
          ["首页优化：核心转化飙升", "+24.3%"],
          ["对比页优化：加购率提效", "+4.2pp"],
        ],
        nav: [
          ["2025的战略背景", "Shokz 作为全球运动耳机领跑者，官网已不仅是技术科普窗口，而是驱动 DTC 增长的核心引擎。"],
          ["三个整体目标", "通过用户研究、组件库建设与流程重塑，系统性提升官网体验与协作效率。"],
          ["机遇与难点", "资源错配、决策碎片与流程缺失，共同构成官网体验升级的三大系统性阻力。"],
          ["规划阶段", "从基建搭建与用户研究入手，经历核心页面改版上线，沉淀为可持续优化机制。"],
          ["执行细节", "从立项、资源补充到组件库与核心页面改版，完成官网体验的系统性升级。"],
        ],
        sections: [
          {
            id: "c1",
            bg: "#dfe6de",
            kicker: "01 / Strategic Context",
            title: "韶音科技全球快速扩张",
            copy: [
              "品牌进入全球扩张深水区后，官网需要承担品牌心智、产品理解、购买路径和用户支持的复合任务。",
              "这个 demo 保留现有页面的大标题、目录、内容板块层级，只把布局组织方式换成更适合响应式复刻的结构。",
            ],
            points: [["60+", "覆盖国家和地区"], ["7M+", "累计用户规模"], ["4.7", "Customer Review Rating"]],
          },
          {
            id: "c2",
            bg: "#ead9d2",
            kicker: "02 / Target",
            title: "三个整体目标",
            copy: [
              "通过大样本问卷与典型用户深访建立用户档案，识别官网全链路中的真实摩擦点。",
              "同时制定统一的色彩、字体及间距系统，建设 UI 基础组件库，降低跨部门沟通成本。",
            ],
            points: [["官网首次用研", "建立用户档案和摩擦点清单"], ["构建组件库", "统一视觉表达和基础组件"], ["重塑流程规范", "明确设计到开发的交付路径"]],
          },
          {
            id: "c3",
            bg: "#e4e0d8",
            kicker: "03 / Challenges",
            title: "机遇与难点",
            copy: [
              "资源配置与交付需求持续错位，导致系统性优化和高频运营交付在资源分配上产生冲突。",
              "全球化运营下的决策权碎片化，也让官网优化长期依赖非量化依据。",
            ],
            points: [["资源配置", "外包资源缺口与沟通路径冗长"], ["决策碎片", "区域优先级与评价标准分散"], ["流程基建", "缺少长期体验演进规划"]],
          },
          {
            id: "c4",
            bg: "#dde7ef",
            kicker: "04 / Timeline",
            title: "规划阶段",
            copy: [
              "从用户路径、工作流沉淀和团队搭建开始，进入核心页面优化和数据复盘阶段。",
              "响应式复刻时，这类时间线板块仍保留原本的文案层级，只在小屏幕上改为上下堆叠。",
            ],
            points: [["07.08", "探索与诊断期"], ["10.08", "核心页面改版"], ["11.08", "复盘与机制沉淀"]],
          },
          {
            id: "c5",
            bg: "#d9ddd4",
            kicker: "05 / Product Thinking",
            title: "产研概念导入",
            copy: [
              "在缺乏 DTC 基因或技术较弱的传统企业中，网页常被视为一次性的数字名片，而非持续生长的业务引擎。",
              "因此页面需要表达需求分析、系统设计、研发编码、数据收集与迭代优化的连续关系。",
            ],
            points: [["需求分析", "定义业务目标"], ["系统设计", "拆解页面能力"], ["迭代优化", "持续数据闭环"]],
          },
          {
            id: "c6",
            bg: "#ebe1da",
            kicker: "06 / Team",
            title: "组织与工作流",
            copy: [
              "国际与北美产品经理双擎驱动本地化定制，设计代表统筹全渠道视觉与 UX 体验。",
              "新增内部设计团队保障视觉交付，并引入外部开发经理严控代码质量。",
            ],
            points: [["设计代表", "统筹视觉与体验"], ["产品经理", "定义区域优先级"], ["开发经理", "保障落地质量"]],
          },
          {
            id: "c7",
            bg: "#d8e3e0",
            kicker: "07 / Research",
            title: "用户研究",
            copy: [
              "通过有效清洗样本、深访洞察和系统卡点处理，将用户研究从一次性材料变成可持续的页面优化机制。",
            ],
            points: [["529", "有效清洗样本"], ["600", "深访洞察时长"], ["35", "闭环落地更新项"]],
          },
          {
            id: "c8",
            bg: "#e7e0d2",
            kicker: "08 / Persona",
            title: "决策型目标买家",
            copy: [
              "重度依赖移动端碎片化时间进行快速浏览，购买动机往往由即将到来的运动赛事驱动，目的性极强。",
            ],
            points: [["设备", "移动端为主"], ["决策周期", "Within 1 day"], ["诉求", "快速定位与顺畅支付"]],
          },
          {
            id: "c9",
            bg: "#dfe4ea",
            kicker: "09 / Journey",
            title: "用户旅程",
            copy: [
              "用户通过 Google 搜索品牌词进入，快速扫视首屏，试图寻找官方背书与核心科技解释。",
              "优化方向包括强化品牌背书、DTC 利益点、科技降维解释与社会认同。",
            ],
            points: [["认知与入站", "建立可信度"], ["浏览与定位", "减少导航摩擦"], ["转化与加购", "强化购买保障"]],
          },
          {
            id: "c10",
            bg: "#e9ded8",
            kicker: "10 / Components",
            title: "组件库沉淀",
            copy: [
              "统一促销、产品卡、弹窗、首页模块等高频组件，让不同区域站点可以复用同一套视觉和交互规范。",
            ],
            points: [["Product Card", "卡片规范"], ["Popup", "促销弹窗"], ["Homepage", "首页模块"]],
          },
          {
            id: "c11",
            bg: "#dcded8",
            kicker: "11 / Final",
            title: "页面浏览预览",
            copy: [
              "最终板块保留页面浏览、案例截图和结果展示。复刻其他项目时，只需要替换素材和说明文字。",
            ],
            points: [["01", "首页改版"], ["02", "集合页优化"], ["03", "产品页体验"]],
            gallery: true,
          },
        ],
        next: "GTM视觉整合设计",
      };

      const app = document.querySelector("#app");

      const esc = (value) =>
        String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      function statTemplate([label, value]) {
        return `<div class="h-stat"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`;
      }

      function navTemplate([title, body], index) {
        return `
          <a class="acc-item" href="#c${index + 1}">
            <div class="acc-trigger"><span>${esc(title)}</span><span>+</span></div>
            <div class="acc-body">${esc(body)}</div>
          </a>
        `;
      }

      function pointTemplate([title, body]) {
        return `<div class="mini"><b>${esc(title)}</b><span>${esc(body)}</span></div>`;
      }

      function sectionTemplate(section, index) {
        const media = `<div class="media" style="--media-bg: ${esc(section.bg)};" aria-hidden="true"></div>`;
        const copy = `
          <div class="copy">
            <div class="kicker">${esc(section.kicker)}</div>
            <h2 class="title">${esc(section.title)}</h2>
            <div class="text">${section.copy.map((line) => `<p>${esc(line)}</p>`).join("")}</div>
            <div class="mini-grid">${section.points.map(pointTemplate).join("")}</div>
          </div>
        `;

        if (section.gallery) {
          return `
            <article class="card gallery-card" id="${esc(section.id)}">
              <div class="card-inner">${copy}</div>
              <div class="gallery">
                <div class="shot" style="--media-bg: ${esc(section.bg)}"></div>
                <div class="shot" style="--media-bg: #e8ddd6"></div>
                <div class="shot" style="--media-bg: #dfe7ee"></div>
              </div>
            </article>
          `;
        }

        return `
          <article class="card" id="${esc(section.id)}">
            <div class="card-inner">
              ${index % 2 === 0 ? media + copy : copy + media}
            </div>
          </article>
        `;
      }

      app.innerHTML = `
        <header class="header">
          <nav class="breadcrumb">${esc(project.breadcrumb)}</nav>
          <h1 class="h-title">${esc(project.title)}</h1>
          <div class="h-stats">${project.stats.map(statTemplate).join("")}</div>
        </header>

        <section class="body">
          <aside class="rail" aria-label="项目目录">
            ${project.nav.map(navTemplate).join("")}
          </aside>
          <main class="content">
            ${project.sections.map(sectionTemplate).join("")}
          </main>
        </section>

        <section class="outro">
          <div class="outro-inner">
            <div>
              <span class="next-eyebrow">下一个项目</span>
              <div class="next-title">${esc(project.next)}</div>
            </div>
            <div class="next-thumb" aria-hidden="true"></div>
          </div>
        </section>
      `;
    </script>
  </body>
</html>
